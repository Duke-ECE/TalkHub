spring:
  application:
    name: talkhub-backend
  datasource:
    url: ${DB_DSN:jdbc:postgresql://localhost:5432/echocenter?sslmode=disable}
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt-secret: ${JWT_SECRET:change-me}
  database:
    auto-create-if-missing: ${DB_AUTO_CREATE_IF_MISSING:true}
    host: ${PG_HOST:localhost}
    port: ${PG_PORT:5432}
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:postgres}
    name: ${PG_DATABASE:echocenter}
    sslmode: ${PG_SSLMODE:disable}
    bootstrap-database: ${PG_BOOTSTRAP_DATABASE:postgres}
  realtime:
    websocket-path: /ws
