spring:
  application:
    name: talkhub-backend
  datasource:
    url: ${DB_DSN:jdbc:postgresql://localhost:5432/echocenter?sslmode=disable}
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  sql:
    init:
      mode: always
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt-secret: ${JWT_SECRET:change-me}
  jwt-expires-seconds: ${JWT_EXPIRES_SECONDS:86400}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123456}
    nickname: ${ADMIN_NICKNAME:Administrator}
  mock:
    enabled: ${APP_MOCK_ENABLED:false}
    password: ${APP_MOCK_PASSWORD:mock123456}
  database:
    auto-create-if-missing: ${DB_AUTO_CREATE_IF_MISSING:true}
    host: ${PG_HOST:localhost}
    port: ${PG_PORT:5432}
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:postgres}
    name: ${PG_DATABASE:echocenter}
    sslmode: ${PG_SSLMODE:disable}
    bootstrap-database: ${PG_BOOTSTRAP_DATABASE:postgres}
  im:
    enabled: ${IM_ENABLED:false}
    host: ${IM_HOST:0.0.0.0}
    port: ${IM_PORT:9090}
    boss-threads: ${IM_BOSS_THREADS:1}
    worker-threads: ${IM_WORKER_THREADS:0}
    reader-idle-seconds: ${IM_READER_IDLE_SECONDS:60}
    writer-idle-seconds: ${IM_WRITER_IDLE_SECONDS:25}
    max-frame-length: ${IM_MAX_FRAME_LENGTH:1048576}
    compression-threshold-bytes: ${IM_COMPRESSION_THRESHOLD_BYTES:512}
    session-ttl-seconds: ${IM_SESSION_TTL_SECONDS:120}
